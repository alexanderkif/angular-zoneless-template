<button
  class="user-menu__button"
  (click)="toggleMenu($event)"
  aria-label="User menu"
  aria-haspopup="true"
  [aria-expanded]="showMenu"
>
  @if (isAuthLoading()) {
    <span class="user-menu__loader"></span>
  } @else {
    @if (userAvatar()) {
      <img
        [ngSrc]="userAvatar() || ''"
        [alt]="userName()"
        class="user-menu__avatar"
        width="40"
        height="40"
        priority
      />
    } @else {
      <span class="user-menu__avatar-placeholder">{{ userName().charAt(0).toUpperCase() }}</span>
    }
  }
</button>
@if (showMenu) {
  <div class="user-menu__list" role="menu" (keydown.escape)="closeMenu()">
    <div class="user-menu__name">{{ userName() }}</div>
    <ul role="none">
      @if (userName() === GUEST) {
        <li role="none">
          <button
            class="user-menu__item"
            id="login"
            role="menuitem"
            (click)="handleAction('login')"
          >
            Login
          </button>
        </li>
      } @else {
        <li role="none">
          <button
            class="user-menu__item"
            id="settings"
            role="menuitem"
            (click)="handleAction('settings')"
          >
            Settings
          </button>
        </li>
        <li role="none">
          <button class="user-menu__item" id="exit" role="menuitem" (click)="handleAction('exit')">
            Logout
          </button>
        </li>
      }
    </ul>
  </div>
}
